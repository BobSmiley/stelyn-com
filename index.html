<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stelyn Consulting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:       #1a1a2e;
      --mist:      #f0f2f5;
      --slate:     #4a5568;
      --rule:      #c8d0da;
      --accent:    #2e5b8a;
      --accent-lt: #4a7fbd;
    }

    html { font-size: 16px; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--mist);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
    }

    /* ── MAIN ── */
    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: clamp(3rem, 10vw, 8rem) clamp(2rem, 8vw, 7rem);
      max-width: 860px;
    }

    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-weight: 400;
      font-size: clamp(2.6rem, 6vw, 4.2rem);
      line-height: 1.08;
      color: var(--ink);
      margin-bottom: 1.75rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent-lt);
    }

    .rule {
      width: 3rem;
      height: 2px;
      background: var(--accent);
      margin-bottom: 1.75rem;
    }

    .bio {
      font-size: clamp(1rem, 2vw, 1.125rem);
      font-weight: 300;
      line-height: 1.75;
      color: var(--slate);
      max-width: 52ch;
      margin-bottom: 3rem;
    }

    .card {
      background: white;
      border: 1px solid var(--rule);
      border-left: 3px solid var(--accent);
      padding: 1.25rem 1.75rem;
      border-radius: 0 4px 4px 0;
    }

    .card-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .card-value {
      font-size: 1rem;
      font-weight: 400;
      color: var(--ink);
    }

    /* ── FOOTER ── */
    footer {
      padding: 1.5rem clamp(2rem, 8vw, 7rem);
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .footer-name {
      font-family: 'DM Serif Display', serif;
      font-size: 0.95rem;
      color: var(--ink);
      letter-spacing: 0.01em;
    }

    .footer-location {
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--slate);
      letter-spacing: 0.04em;
    }

    @media (max-width: 480px) {
      footer { flex-direction: column; align-items: flex-start; }
    }

    @media (prefers-reduced-motion: no-preference) {
      main { animation: fadein 0.6s ease both; }
      @keyframes fadein { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    }
  </style>
</head>
<body>

  <main>
    <p class="eyebrow">Stelyn Consulting</p>

    <h1>Let's get your systems<br>working <em>for</em> you.</h1>

    <div class="rule"></div>

    <p class="bio">
      Independent consulting in software development and database architecture.
      Practical solutions built to last — without the overhead.
    </p>

    <div class="card">
      <p class="card-label">Principal</p>
      <p class="card-value">Bob Smiley</p>
    </div>
  </main>

  <footer>
    <span class="footer-name">Stelyn Consulting</span>
    <span class="footer-location">Granite Bay, CA</span>
  </footer>

</body>
</html>
